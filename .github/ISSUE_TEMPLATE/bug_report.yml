name: Bug report
description: Report a broken command, script behavior, or docs mismatch.
title: "[bug] "
labels: ["bug", "needs reproduction"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for reproduction.
  - type: input
    id: area
    attributes:
      label: Area
      description: Which area is affected?
      placeholder: SQL_script | dbt | file_structure | docker | docs | security | models | other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact commands and sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, Docker version, and related tooling versions.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I have removed secrets, tokens, and credentials from logs.
          required: true
